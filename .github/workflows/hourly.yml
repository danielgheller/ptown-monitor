name: Hourly status check

# Runs every hour. Two side effects:
#   1. notify.py --on-change-only emails Daniel when overall status changes
#      (vs. prior run, tracked in notify-state.json via Actions cache).
#   2. build_site.py refreshes docs/data.json for the GitHub Pages dashboard;
#      if the file changed, we commit and push back to main.
#
# The dashboard.py call happens once and its output is piped into both tools,
# so we don't hit the vendor APIs twice per run.
#
# Manual trigger is kept for testing ("Run workflow" button on the Actions tab).

on:
  schedule:
    # Every hour at :15, to avoid the thundering-herd at :00.
    - cron: '15 * * * *'
  workflow_dispatch:
  # Run immediately when IN_PTOWN flips. The Cloudflare Worker (and GH
  # web-UI fallback) creates/deletes this file when Daniel taps the toggle
  # in an email — without this trigger he'd wait up to an hour for the new
  # state to take effect. Path filter keeps unrelated commits from re-running.
  push:
    paths:
      - 'IN_PTOWN'

# Only one run at a time — if an hourly run is somehow still going when the
# next one fires, cancel the new one rather than doubling up on the state
# file. (Very unlikely in practice; the checks take under 30 seconds.)
concurrency:
  group: ptown-hourly
  cancel-in-progress: false

# Opt all JS-based actions into Node 24. GitHub is deprecating Node 20 on
# their runners in mid-2026; this env var is their documented escape hatch so
# we don't have to track every action's major-version bump individually.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Default GITHUB_TOKEN is read-only on workflows triggered by schedule; we
# need write so the "Commit dashboard" step below can push docs/data.json.
permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Restore the most recent state file from the Actions cache so we know
      # what the status was on the last run. First ever run will miss (that's
      # fine — notify.py treats "no prior state" as OK-baseline).
      - name: Restore prior notify-state
        uses: actions/cache/restore@v4
        id: state-restore
        with:
          path: notify-state.json
          key: ptown-notify-state-${{ github.run_id }}
          restore-keys: |
            ptown-notify-state-

      - name: Run checks, notify, and build site
        env:
          NUHEAT_EMAIL:       ${{ secrets.NUHEAT_EMAIL }}
          NUHEAT_PASSWORD:    ${{ secrets.NUHEAT_PASSWORD }}
          SMARTTUB_EMAIL:     ${{ secrets.SMARTTUB_EMAIL }}
          SMARTTUB_PASSWORD:  ${{ secrets.SMARTTUB_PASSWORD }}
          NEST_PROJECT_ID:    ${{ secrets.NEST_PROJECT_ID }}
          NEST_CLIENT_ID:     ${{ secrets.NEST_CLIENT_ID }}
          NEST_CLIENT_SECRET: ${{ secrets.NEST_CLIENT_SECRET }}
          NEST_REFRESH_TOKEN: ${{ secrets.NEST_REFRESH_TOKEN }}
          # SmartThings PAT for the garage door (via OHD Anywhere → SmartThings).
          # SMARTTHINGS_DEVICE_ID is optional; if absent, garage.py auto-discovers
          # the door-capable device on each run.
          SMARTTHINGS_TOKEN:     ${{ secrets.SMARTTHINGS_TOKEN }}
          SMARTTHINGS_DEVICE_ID: ${{ secrets.SMARTTHINGS_DEVICE_ID }}
          RESEND_API_KEY:     ${{ secrets.RESEND_API_KEY }}
          NOTIFY_TO_EMAIL:    ${{ secrets.NOTIFY_TO_EMAIL }}
          # One-tap toggle URL plumbing — when both are set, notify.py emits
          # signed Cloudflare Worker URLs so the email button is true one-tap.
          # When unset (e.g. Worker not deployed yet), notify.py falls back
          # to the GitHub UI URL pattern automatically.
          WORKER_URL:         ${{ secrets.WORKER_URL }}
          TOGGLE_SECRET:      ${{ secrets.TOGGLE_SECRET }}
        # IMPORTANT: GH runs this with `bash -e {0}` by default, so any
        # non-zero exit aborts the step. dashboard.py uses its exit code to
        # COMMUNICATE STATUS (0=ok, 1=warn, 2=crit) — those are not script
        # failures, they're the entire point of running. Override the shell
        # to plain bash and gate failures explicitly so a CRIT reading still
        # flows through to notify.py and build_site.py. (Without this, the
        # one hour you most want an alert is the one that fails to send it.)
        shell: bash {0}
        run: |
          # Run dashboard.py and capture its exit (status code, NOT failure).
          python dashboard.py --json > /tmp/dashboard.json
          dash_exit=$?
          if [ ! -s /tmp/dashboard.json ]; then
            echo "::error::dashboard.py produced no output (exit=$dash_exit)"
            exit 1
          fi
          echo "dashboard.py exit=$dash_exit (0=ok 1=warn 2=crit) — proceeding"

          # notify.py failure must NOT prevent the dashboard update — e.g. if
          # Resend is rate-limited or down, the HTML dashboard is still the
          # fastest way for Daniel to check status, and we don't want to skip it.
          python notify.py --stdin --on-change-only < /tmp/dashboard.json
          notify_exit=$?
          if [ $notify_exit -ne 0 ]; then
            echo "::warning::notify.py exited with code $notify_exit (continuing to site build)"
          fi

          # build_site.py is the one step we DO want to fail the workflow on,
          # since a broken docs/data.json would freeze the live dashboard.
          python build_site.py --stdin < /tmp/dashboard.json
          build_exit=$?
          if [ $build_exit -ne 0 ]; then
            echo "::error::build_site.py exited with code $build_exit"
            exit $build_exit
          fi

      # Commit the refreshed dashboard. We only commit if docs/ actually
      # changed — usually data.json changes every run (new reading appended to
      # history) but this guard avoids empty commits if dashboard.py happened
      # to emit byte-identical output.
      #
      # Push is retried with a rebase on rejection. This handles three races:
      #   - concurrent workflows (shouldn't happen with our `concurrency:` group,
      #     but belt-and-suspenders)
      #   - "Re-run jobs" from an older SHA while `main` has already advanced
      #   - manual pushes from Daniel landing mid-run
      # `-X theirs` prefers this run's fresh data.json over any stale version
      # on the base branch, since we fully own that file.
      - name: Commit dashboard update
        if: always()
        run: |
          if [ -z "$(git status --porcelain docs/)" ]; then
            echo "No dashboard changes to commit."
            exit 0
          fi
          git config user.name "Ptown Monitor Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "Dashboard: hourly update [skip ci]"
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt rejected; rebasing onto origin/main..."
            git pull --rebase -X theirs origin main
          done
          echo "::error::Failed to push dashboard update after 3 attempts"
          exit 1

      # Always save the updated state file back to the cache, even if the
      # notify step failed — otherwise a transient API blip would cause us to
      # email "recovered!" on the next run.
      - name: Save notify-state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: notify-state.json
          key: ptown-notify-state-${{ github.run_id }}
