name: Daily summary

# Once-a-day "everything's fine" email so you know the monitor itself is alive.
#
# Scheduled for 09:17 UTC = 5:17am EDT (summer) / 4:17am EST (winter). Two
# reasons for this specific time:
#   1. We fire WELL before the target inbox-arrival time (~7am ET) so that
#      GitHub Actions' typical 30-60 min cron delay — and the occasional
#      2-3 hour delay — still lands the email before the morning check.
#   2. :17 avoids the :00 "thundering herd" minute, which is by far the most
#      contested and routinely delayed slot on the shared scheduler. An
#      earlier incident (Apr 19 2026) had the :00 daily run delayed ~4 hours.
# We accept the one-hour drift across DST rather than maintaining two schedules.
#
# Unlike the hourly workflow, this one ALWAYS sends — that's the whole point.
# It uses `notify.py --daily` which bypasses the change-detection logic.

on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:

# Opt all JS-based actions into Node 24. GitHub is deprecating Node 20 on
# their runners in mid-2026; this env var is their documented escape hatch so
# we don't have to track every action's major-version bump individually.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send daily summary
        env:
          NUHEAT_EMAIL:       ${{ secrets.NUHEAT_EMAIL }}
          NUHEAT_PASSWORD:    ${{ secrets.NUHEAT_PASSWORD }}
          SMARTTUB_EMAIL:     ${{ secrets.SMARTTUB_EMAIL }}
          SMARTTUB_PASSWORD:  ${{ secrets.SMARTTUB_PASSWORD }}
          NEST_PROJECT_ID:    ${{ secrets.NEST_PROJECT_ID }}
          NEST_CLIENT_ID:     ${{ secrets.NEST_CLIENT_ID }}
          NEST_CLIENT_SECRET: ${{ secrets.NEST_CLIENT_SECRET }}
          NEST_REFRESH_TOKEN: ${{ secrets.NEST_REFRESH_TOKEN }}
          RESEND_API_KEY:     ${{ secrets.RESEND_API_KEY }}
          NOTIFY_TO_EMAIL:    ${{ secrets.NOTIFY_TO_EMAIL }}
        run: python notify.py --daily
