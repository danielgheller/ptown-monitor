name: Daily summary

# Once-a-day "everything's fine" email so you know the monitor itself is alive.
#
# Scheduled for 09:17 UTC = 5:17am EDT (summer) / 4:17am EST (winter). Two
# reasons for this specific time:
#   1. We fire WELL before the target inbox-arrival time (~7am ET) so that
#      GitHub Actions' typical 30-60 min cron delay — and the occasional
#      2-3 hour delay — still lands the email before the morning check.
#   2. :17 avoids the :00 "thundering herd" minute, which is by far the most
#      contested and routinely delayed slot on the shared scheduler. An
#      earlier incident (Apr 19 2026) had the :00 daily run delayed ~4 hours.
# We accept the one-hour drift across DST rather than maintaining two schedules.
#
# Unlike the hourly workflow, this one ALWAYS sends — that's the whole point.
# It uses `notify.py --daily` which bypasses the change-detection logic.

on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:

# Serialize against the hourly workflow (same group name) so the two can't
# refresh the rotating SmartThings token at the same time and double-spend it.
# See hourly.yml for the full rationale.
concurrency:
  group: ptown-monitor-oauth
  cancel-in-progress: false

# Opt all JS-based actions into Node 24. GitHub is deprecating Node 20 on
# their runners in mid-2026; this env var is their documented escape hatch so
# we don't have to track every action's major-version bump individually.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # See hourly.yml for full rationale — the SmartThings refresh_token
      # rotates on every use, so we must restore the cached state file
      # rather than burning through the bootstrap secret every run.
      - name: Restore SmartThings OAuth state
        uses: actions/cache/restore@v4
        with:
          path: smartthings-oauth-state.json
          key: ptown-st-oauth-${{ github.run_id }}
          restore-keys: |
            ptown-st-oauth-

      # Awning assumed-position record — read-only, see hourly.yml.
      - name: Restore awnings state
        uses: actions/cache/restore@v4
        with:
          path: awnings-state.json
          key: ptown-awnings-state-${{ github.run_id }}
          restore-keys: |
            ptown-awnings-state-

      - name: Send daily summary
        env:
          NUHEAT_EMAIL:       ${{ secrets.NUHEAT_EMAIL }}
          NUHEAT_PASSWORD:    ${{ secrets.NUHEAT_PASSWORD }}
          SMARTTUB_EMAIL:     ${{ secrets.SMARTTUB_EMAIL }}
          SMARTTUB_PASSWORD:  ${{ secrets.SMARTTUB_PASSWORD }}
          NEST_PROJECT_ID:    ${{ secrets.NEST_PROJECT_ID }}
          NEST_CLIENT_ID:     ${{ secrets.NEST_CLIENT_ID }}
          NEST_CLIENT_SECRET: ${{ secrets.NEST_CLIENT_SECRET }}
          NEST_REFRESH_TOKEN: ${{ secrets.NEST_REFRESH_TOKEN }}
          # SmartThings OAuth-In SmartApp — see smartthings_oauth.py.
          SMARTTHINGS_CLIENT_ID:       ${{ secrets.SMARTTHINGS_CLIENT_ID }}
          SMARTTHINGS_CLIENT_SECRET:   ${{ secrets.SMARTTHINGS_CLIENT_SECRET }}
          SMARTTHINGS_REFRESH_TOKEN:   ${{ secrets.SMARTTHINGS_REFRESH_TOKEN }}
          SMARTTHINGS_DEVICE_ID:       ${{ secrets.SMARTTHINGS_DEVICE_ID }}
          SMARTTHINGS_LOCK_DEVICE_ID:  ${{ secrets.SMARTTHINGS_LOCK_DEVICE_ID }}
          RESEND_API_KEY:     ${{ secrets.RESEND_API_KEY }}
          NOTIFY_TO_EMAIL:    ${{ secrets.NOTIFY_TO_EMAIL }}
          # See hourly.yml — when configured, notify.py emits signed
          # Cloudflare Worker URLs for one-tap toggle from email; otherwise
          # it falls back to the GitHub UI.
          WORKER_URL:         ${{ secrets.WORKER_URL }}
          TOGGLE_SECRET:      ${{ secrets.TOGGLE_SECRET }}
        run: python notify.py --daily

      # Persist the rotated refresh_token back to the cache so the next
      # daily/hourly run can use it. Same `if: always()` reasoning as hourly.
      - name: Save SmartThings OAuth state
        if: always() && hashFiles('smartthings-oauth-state.json') != ''
        uses: actions/cache/save@v4
        with:
          path: smartthings-oauth-state.json
          key: ptown-st-oauth-${{ github.run_id }}
