name: Apply control action

# Triggered by the Cloudflare Worker (one-tap email button) via the GitHub
# REST workflow_dispatch endpoint, OR manually from the Actions tab for
# testing. The worker passes an `action` input that names which preset to
# apply — control.py is the single source of truth for what each action
# actually does on the devices.
#
# Why a separate workflow rather than re-using hourly.yml:
#   - Different concurrency profile (control taps should never queue behind
#     a long-running hourly check).
#   - Different exit-code semantics (control.py returns non-zero on device
#     failure, which we WANT to surface as a failed run; hourly.yml
#     deliberately swallows non-zero exits from dashboard.py).
#   - Separate Actions UI page makes a "what did the buttons do" history
#     trivially auditable.

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Which control action to apply'
        required: true
        type: choice
        options:
          - away_all
          - tub_104
          - nest_off_eco
          - master_bath_72
          - garage_close
          - awnings_close
          - awnings_open
          - tvs_off

# Shares the OAuth concurrency group with hourly.yml/daily.yml because
# garage_close refreshes the same rotating SmartThings token — a control tap
# landing mid-hourly-run would double-spend it (the exact bug that killed
# garage/lock/caseta in June 2026). cancel-in-progress:false means taps
# QUEUE behind a running check (~30s) instead of cancelling it. Trade-off
# vs. the old "last tap wins" behavior: mashing a button now queues
# duplicates — harmless, all actions are idempotent setpoints/commands.
concurrency:
  group: ptown-monitor-oauth
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# No git writes from this workflow — IN_PTOWN is committed by the worker
# itself (it has its own PAT). Default GITHUB_TOKEN read perms are fine.
permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # 3.12 (not 3.11 like hourly/daily) because pyoverkiz — the Somfy
          # awning library — requires 3.12+. The awning actions only run
          # here, so the other workflows can stay put.
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # garage_close refreshes the rotating SmartThings token, so this
      # workflow must participate in the same state-file cache as
      # hourly.yml — otherwise it would spend the token from the bootstrap
      # secret and strand the cached one (or vice versa). Same keys, same
      # save-always semantics. Harmless no-op for non-SmartThings actions.
      - name: Restore SmartThings OAuth state
        uses: actions/cache/restore@v4
        with:
          path: smartthings-oauth-state.json
          key: ptown-st-oauth-${{ github.run_id }}
          restore-keys: |
            ptown-st-oauth-

      - name: Apply ${{ inputs.action }}
        env:
          NUHEAT_EMAIL:       ${{ secrets.NUHEAT_EMAIL }}
          NUHEAT_PASSWORD:    ${{ secrets.NUHEAT_PASSWORD }}
          SMARTTUB_EMAIL:     ${{ secrets.SMARTTUB_EMAIL }}
          SMARTTUB_PASSWORD:  ${{ secrets.SMARTTUB_PASSWORD }}
          NEST_PROJECT_ID:    ${{ secrets.NEST_PROJECT_ID }}
          NEST_CLIENT_ID:     ${{ secrets.NEST_CLIENT_ID }}
          NEST_CLIENT_SECRET: ${{ secrets.NEST_CLIENT_SECRET }}
          NEST_REFRESH_TOKEN: ${{ secrets.NEST_REFRESH_TOKEN }}
          # SmartThings OAuth — needed by garage_close. Same secrets as
          # hourly.yml; the token itself must carry x:devices:* scope
          # (granted by the smartthings_bootstrap.py re-auth).
          SMARTTHINGS_CLIENT_ID:     ${{ secrets.SMARTTHINGS_CLIENT_ID }}
          SMARTTHINGS_CLIENT_SECRET: ${{ secrets.SMARTTHINGS_CLIENT_SECRET }}
          SMARTTHINGS_REFRESH_TOKEN: ${{ secrets.SMARTTHINGS_REFRESH_TOKEN }}
          SMARTTHINGS_DEVICE_ID:     ${{ secrets.SMARTTHINGS_DEVICE_ID }}
          # Awnings (awnings_close / awnings_open) need NO extra secrets —
          # they ride the SmartThings OAuth above via the TaHoma ↔
          # SmartThings linked service. Somfy's own NA cloud is closed to
          # third parties (see awnings.py header for the full story).
        # Default `bash -e {0}` is what we want here: control.py exits 1
        # if any device call failed and we WANT that to surface as a failed
        # run (turns into a GH email + red dot in the Actions UI, which is
        # how Daniel learns the button didn't fully work).
        run: python control.py "${{ inputs.action }}"

      # Persist the rotated SmartThings token even if the action failed —
      # same rationale as hourly.yml: losing a rotation strands the token.
      - name: Save SmartThings OAuth state
        if: always() && hashFiles('smartthings-oauth-state.json') != ''
        uses: actions/cache/save@v4
        with:
          path: smartthings-oauth-state.json
          key: ptown-st-oauth-${{ github.run_id }}
