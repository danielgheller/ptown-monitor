<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f6f7f9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Ptown Status</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext x='0' y='14' font-size='14'%3E🏠%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --fg: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --axis: #d1d5db;
      --ok: #10b981;
      --warn: #f59e0b;
      --crit: #ef4444;
      --spark: #3b82f6;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1115;
        --card: #181b22;
        --fg: #f3f4f6;
        --muted: #9ca3af;
        --border: #2a2f3a;
        --axis: #3a4050;
        --spark: #60a5fa;
      }
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      padding: 1rem env(safe-area-inset-right, 1rem) 2rem env(safe-area-inset-left, 1rem);
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }
    main { max-width: 720px; margin: 0 auto; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1.25rem;
      padding: 0 0.25rem;
      flex-wrap: wrap;
    }
    h1 { font-size: 1.375rem; margin: 0; font-weight: 600; }
    .updated { color: var(--muted); font-size: 0.8125rem; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.875rem 1.125rem;
      margin-bottom: 0.875rem;
    }
    .system-header {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      margin-bottom: 0.75rem;
      font-weight: 600;
      font-size: 1.0625rem;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.ok { background: var(--ok); }
    .dot.warn { background: var(--warn); }
    .dot.crit {
      background: var(--crit);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }
    .device {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: start;
      gap: 0.75rem;
      padding: 0.75rem 0;
      border-top: 1px solid var(--border);
    }
    .device:first-of-type { border-top: none; padding-top: 0.375rem; }
    .device-name { font-weight: 500; font-size: 0.9375rem; }
    .device-detail {
      color: var(--muted);
      font-size: 0.8125rem;
      margin-top: 0.125rem;
    }
    /* Each temp cell: value row on top, two sparkline rows (24h, 7d) below. */
    .temp {
      display: flex;
      flex-direction: column;
      gap: 0.3125rem;
    }
    .temp-top {
      font-variant-numeric: tabular-nums;
      text-align: right;
      white-space: nowrap;
      padding: 0.3125rem 0.625rem;
    }
    .temp-label {
      color: var(--muted);
      font-size: 0.6875rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.0625rem;
    }
    .temp-value { font-weight: 600; font-size: 1rem; }
    /* SET is the primary signal — boxed value for emphasis. */
    .temp-set .temp-top {
      background: rgba(0, 0, 0, 0.035);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .temp-set .temp-value { color: var(--fg); }
    /* NOW is secondary — vertical divider + dimmed unless out of spec. */
    .temp-now {
      padding-left: 0.875rem;
      border-left: 1px solid var(--border);
    }
    .temp-now .temp-value { color: var(--muted); }
    .device-status-warn .temp-now .temp-value { color: var(--warn); }
    .device-status-crit .temp-now .temp-value { color: var(--crit); }
    @media (prefers-color-scheme: dark) {
      .temp-set .temp-top { background: rgba(255, 255, 255, 0.045); }
    }
    /* Sparkline row: "24H" / "7D" timeframe label + the SVG chart. */
    .spark-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.375rem;
    }
    .spark-timeframe {
      color: var(--muted);
      font-size: 0.625rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
      width: 20px;
      text-align: right;
    }
    .spark {
      height: 22px;
      width: 80px;
      display: block;
    }
    .error {
      color: var(--crit);
      font-size: 0.875rem;
      padding: 0.375rem 0;
    }
    .loading, .empty {
      color: var(--muted);
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.9375rem;
    }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 1rem;
    }
    footer a { color: inherit; }
    @media (max-width: 480px) {
      .device { gap: 0.5rem; padding: 0.625rem 0; }
      .spark { width: 54px; }
      .spark-timeframe { width: 18px; }
      .temp-top { padding: 0.25rem 0.4375rem; }
      .temp-now { padding-left: 0.5rem; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>🏠 Ptown Status</h1>
      <div class="updated" id="updated">Loading…</div>
    </header>
    <div id="content" class="loading">Loading…</div>
    <footer>
      Auto-refreshes every 5 min · <a href="https://github.com/danielgheller/ptown-monitor">source</a>
    </footer>
  </main>
  <script>
    // System name → human label
    const LABELS = {
      nuheat: "Heated floors",
      hottub: "Hot tub",
      nest: "Nest"
    };

    async function load() {
      try {
        // Cache-bust so pinned tabs don't get stale data.
        const resp = await fetch("data.json?t=" + Date.now(), { cache: "no-store" });
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        const data = await resp.json();
        render(data);
      } catch (err) {
        document.getElementById("content").innerHTML =
          '<div class="empty">No data yet. The dashboard populates on the next hourly run.</div>';
        document.getElementById("updated").textContent = "";
        console.error(err);
      }
    }

    function render(data) {
      document.getElementById("updated").textContent =
        "Updated " + formatTime(data.generated_at);

      const content = document.getElementById("content");
      content.className = "";
      content.innerHTML = "";

      const systems = (data.current && data.current.systems) || [];
      const hourly  = data.history_hourly || [];
      const daily   = data.history_daily  || [];
      for (const sys of systems) {
        content.appendChild(renderSystem(sys, hourly, daily));
      }
    }

    function renderSystem(sys, hourly, daily) {
      const card = document.createElement("div");
      card.className = "card";

      const header = document.createElement("div");
      header.className = "system-header";
      const dot = document.createElement("span");
      dot.className = "dot " + (sys.overall_status || "ok");
      const label = document.createElement("span");
      label.textContent = LABELS[sys.system] || sys.system;
      header.appendChild(dot);
      header.appendChild(label);
      card.appendChild(header);

      if (sys.error) {
        const err = document.createElement("div");
        err.className = "error";
        err.textContent = sys.error;
        card.appendChild(err);
        return card;
      }

      for (const dev of sys.devices || []) {
        card.appendChild(renderDevice(sys.system, dev, hourly, daily));
      }
      return card;
    }

    function renderDevice(systemName, dev, hourly, daily) {
      const row = document.createElement("div");
      const status = dev.status || "ok";
      row.className = "device device-status-" + status;

      // Column 1: name + mode/reason
      const info = document.createElement("div");
      const nameEl = document.createElement("div");
      nameEl.className = "device-name";
      nameEl.textContent = dev.name;
      const detailEl = document.createElement("div");
      detailEl.className = "device-detail";
      detailEl.textContent = buildDetail(dev);
      info.appendChild(nameEl);
      info.appendChild(detailEl);
      row.appendChild(info);

      const key = systemName + ":" + dev.name;
      // Column 2: SET value + its two sparklines
      row.appendChild(tempColumn("set", "temp-set", dev.setpoint_f, hourly, daily, key, "set"));
      // Column 3: NOW value + its two sparklines
      row.appendChild(tempColumn("now", "temp-now", dev.current_f, hourly, daily, key, "now"));
      return row;
    }

    function tempColumn(label, modClass, value, hourly, daily, key, field) {
      const cell = document.createElement("div");
      cell.className = "temp " + modClass;

      // Top: label + current value (boxed for SET, divider for NOW).
      const top = document.createElement("div");
      top.className = "temp-top";
      const lab = document.createElement("span");
      lab.className = "temp-label";
      lab.textContent = label;
      const val = document.createElement("span");
      val.className = "temp-value";
      val.textContent = formatTemp(value);
      top.appendChild(lab);
      top.appendChild(val);
      cell.appendChild(top);

      // Two stacked sparklines: 24h (hourly cadence), 7d (daily cadence).
      cell.appendChild(sparkRow("24h", hourly, key, field));
      cell.appendChild(sparkRow("7d",  daily,  key, field));
      return cell;
    }

    function sparkRow(label, history, key, field) {
      const row = document.createElement("div");
      row.className = "spark-row";
      const lab = document.createElement("span");
      lab.className = "spark-timeframe";
      lab.textContent = label;
      row.appendChild(lab);
      row.appendChild(sparkline(history, key, field));
      return row;
    }

    function buildDetail(dev) {
      // Setpoint has its own column — keep only the qualitative bits here.
      const parts = [];
      if (dev.mode) parts.push(dev.mode);
      if (dev.reason) parts.push(dev.reason);
      return parts.join(" · ");
    }

    // SVG chart, drawn inline. What we render:
    //   - Y-axis (left) and X-axis (bottom) as thin --axis lines — the "frame"
    //     Daniel asked for, so it reads as a chart instead of a bare squiggle.
    //   - Dashed horizontal reference line at the mean of the window.
    //   - Data line in --spark.
    //   - Filled dot at the most recent point so "now" is obvious.
    //
    // Y-scale is auto-ranged to the window's min/max — shapes are relative,
    // not absolute, so a small wobble can look as big as a big swing.
    function sparkline(history, key, field) {
      const W = 80, H = 22;
      const padL = 3, padR = 2, padT = 3, padB = 3;
      const plotW = W - padL - padR;
      const plotH = H - padT - padB;

      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("class", "spark");
      svg.setAttribute("viewBox", "0 0 " + W + " " + H);
      svg.setAttribute("preserveAspectRatio", "none");

      // Axis frame first so the data line draws on top of it.
      const yAxis = document.createElementNS("http://www.w3.org/2000/svg", "line");
      yAxis.setAttribute("x1", padL); yAxis.setAttribute("x2", padL);
      yAxis.setAttribute("y1", padT); yAxis.setAttribute("y2", H - padB);
      yAxis.setAttribute("stroke", "var(--axis)");
      yAxis.setAttribute("stroke-width", "0.6");
      svg.appendChild(yAxis);
      const xAxis = document.createElementNS("http://www.w3.org/2000/svg", "line");
      xAxis.setAttribute("x1", padL);   xAxis.setAttribute("x2", W - padR);
      xAxis.setAttribute("y1", H - padB); xAxis.setAttribute("y2", H - padB);
      xAxis.setAttribute("stroke", "var(--axis)");
      xAxis.setAttribute("stroke-width", "0.6");
      svg.appendChild(xAxis);

      // Collect this device's field values across the given history window.
      // Skip nulls (device offline for that window).
      const points = [];
      for (const h of history) {
        const r = h.readings && h.readings[key];
        if (!r) continue;
        const v = r[field];
        if (v != null) points.push(v);
      }

      if (points.length === 0) {
        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", (W / 2).toString());
        text.setAttribute("y", (H / 2 + 3).toString());
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("fill", "currentColor");
        text.setAttribute("opacity", "0.35");
        text.setAttribute("font-size", "8");
        text.textContent = "—";
        svg.appendChild(text);
        return svg;
      }

      const min = Math.min(...points);
      const max = Math.max(...points);
      const range = max - min || 1;

      // Dashed midline at the mean of this window — lets you see at a glance
      // which points are above/below average.
      if (points.length >= 2) {
        const mean = points.reduce((a, b) => a + b, 0) / points.length;
        const meanY = padT + plotH - ((mean - min) / range) * plotH;
        const ml = document.createElementNS("http://www.w3.org/2000/svg", "line");
        ml.setAttribute("x1", padL);
        ml.setAttribute("x2", W - padR);
        ml.setAttribute("y1", meanY.toFixed(1));
        ml.setAttribute("y2", meanY.toFixed(1));
        ml.setAttribute("stroke", "var(--axis)");
        ml.setAttribute("stroke-width", "0.4");
        ml.setAttribute("stroke-dasharray", "1.5,1.5");
        svg.appendChild(ml);
      }

      // Single-point window: just the dot centered in the frame.
      if (points.length < 2) {
        const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        dot.setAttribute("cx", ((padL + W - padR) / 2).toFixed(1));
        dot.setAttribute("cy", ((padT + H - padB) / 2).toFixed(1));
        dot.setAttribute("r", "1.5");
        dot.setAttribute("fill", "var(--spark)");
        svg.appendChild(dot);
        return svg;
      }

      const step = plotW / (points.length - 1);
      let d = "";
      for (let i = 0; i < points.length; i++) {
        const x = padL + i * step;
        const y = padT + plotH - ((points[i] - min) / range) * plotH;
        d += (i === 0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1);
      }
      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", d);
      path.setAttribute("fill", "none");
      path.setAttribute("stroke", "var(--spark)");
      path.setAttribute("stroke-width", "1.2");
      path.setAttribute("stroke-linecap", "round");
      path.setAttribute("stroke-linejoin", "round");
      svg.appendChild(path);

      // Last-point dot so "now" reads at a glance.
      const lastX = padL + (points.length - 1) * step;
      const lastY = padT + plotH - ((points[points.length - 1] - min) / range) * plotH;
      const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      dot.setAttribute("cx", lastX.toFixed(1));
      dot.setAttribute("cy", lastY.toFixed(1));
      dot.setAttribute("r", "1.4");
      dot.setAttribute("fill", "var(--spark)");
      svg.appendChild(dot);

      return svg;
    }

    function formatTemp(v) {
      if (v == null) return "—";
      return v.toFixed(1) + "°F";
    }

    function formatTime(iso) {
      if (!iso) return "just now";
      try {
        return new Date(iso).toLocaleString(undefined, {
          dateStyle: "medium",
          timeStyle: "short"
        });
      } catch (_) {
        return iso;
      }
    }

    load();
    // Soft refresh every 5 min while the page is open.
    setInterval(load, 5 * 60 * 1000);
    // Refresh when the tab is foregrounded — useful on phone.
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") load();
    });
  </script>
</body>
</html>
