<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f6f7f9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Ptown Status</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext x='0' y='14' font-size='14'%3E🏠%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --fg: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --ok: #10b981;
      --warn: #f59e0b;
      --crit: #ef4444;
      --spark: #3b82f6;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1115;
        --card: #181b22;
        --fg: #f3f4f6;
        --muted: #9ca3af;
        --border: #2a2f3a;
        --spark: #60a5fa;
      }
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      padding: 1rem env(safe-area-inset-right, 1rem) 2rem env(safe-area-inset-left, 1rem);
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
    }
    main { max-width: 720px; margin: 0 auto; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1.25rem;
      padding: 0 0.25rem;
      flex-wrap: wrap;
    }
    h1 { font-size: 1.375rem; margin: 0; font-weight: 600; }
    .updated { color: var(--muted); font-size: 0.8125rem; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.875rem 1.125rem;
      margin-bottom: 0.875rem;
    }
    .system-header {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      margin-bottom: 0.75rem;
      font-weight: 600;
      font-size: 1.0625rem;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.ok { background: var(--ok); }
    .dot.warn { background: var(--warn); }
    .dot.crit {
      background: var(--crit);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }
    .device {
      display: grid;
      grid-template-columns: 1fr auto auto 72px;
      align-items: center;
      gap: 0.625rem;
      padding: 0.625rem 0;
      border-top: 1px solid var(--border);
    }
    .device:first-of-type { border-top: none; padding-top: 0.25rem; }
    .device-name { font-weight: 500; font-size: 0.9375rem; }
    .device-detail {
      color: var(--muted);
      font-size: 0.8125rem;
      margin-top: 0.125rem;
    }
    .temp {
      font-variant-numeric: tabular-nums;
      text-align: right;
      white-space: nowrap;
      padding: 0.3125rem 0.625rem;
    }
    .temp-label {
      color: var(--muted);
      font-size: 0.6875rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.0625rem;
    }
    .temp-value { font-weight: 600; font-size: 1rem; }
    /* SET is the value he cares about most — boxed for emphasis. */
    .temp-set {
      background: rgba(0, 0, 0, 0.035);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .temp-set .temp-value { color: var(--fg); }
    /* NOW is secondary — plain cell with a vertical divider separating it
       from SET; dimmed color unless out of spec. */
    .temp-now {
      border-left: 1px solid var(--border);
      padding-left: 0.875rem;
    }
    .temp-now .temp-value { color: var(--muted); }
    .device-status-warn .temp-now .temp-value { color: var(--warn); }
    .device-status-crit .temp-now .temp-value { color: var(--crit); }
    @media (prefers-color-scheme: dark) {
      .temp-set { background: rgba(255, 255, 255, 0.045); }
    }
    .spark { height: 28px; width: 72px; display: block; }
    .error {
      color: var(--crit);
      font-size: 0.875rem;
      padding: 0.375rem 0;
    }
    .loading, .empty {
      color: var(--muted);
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.9375rem;
    }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 1rem;
    }
    footer a { color: inherit; }
    @media (max-width: 480px) {
      .device { grid-template-columns: 1fr auto auto; gap: 0.75rem; }
      .spark { display: none; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>🏠 Ptown Status</h1>
      <div class="updated" id="updated">Loading…</div>
    </header>
    <div id="content" class="loading">Loading…</div>
    <footer>
      Auto-refreshes every 5 min · <a href="https://github.com/danielgheller/ptown-monitor">source</a>
    </footer>
  </main>
  <script>
    // System name → human label
    const LABELS = {
      nuheat: "Heated floors",
      hottub: "Hot tub",
      nest: "Nest"
    };

    async function load() {
      try {
        // Cache-bust so pinned tabs don't get stale data.
        const resp = await fetch("data.json?t=" + Date.now(), { cache: "no-store" });
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        const data = await resp.json();
        render(data);
      } catch (err) {
        document.getElementById("content").innerHTML =
          '<div class="empty">No data yet. The dashboard populates on the next hourly run.</div>';
        document.getElementById("updated").textContent = "";
        console.error(err);
      }
    }

    function render(data) {
      document.getElementById("updated").textContent =
        "Updated " + formatTime(data.generated_at);

      const content = document.getElementById("content");
      content.className = "";
      content.innerHTML = "";

      const systems = (data.current && data.current.systems) || [];
      for (const sys of systems) {
        content.appendChild(renderSystem(sys, data.history || []));
      }
    }

    function renderSystem(sys, history) {
      const card = document.createElement("div");
      card.className = "card";

      const header = document.createElement("div");
      header.className = "system-header";
      const dot = document.createElement("span");
      dot.className = "dot " + (sys.overall_status || "ok");
      const label = document.createElement("span");
      label.textContent = LABELS[sys.system] || sys.system;
      header.appendChild(dot);
      header.appendChild(label);
      card.appendChild(header);

      if (sys.error) {
        const err = document.createElement("div");
        err.className = "error";
        err.textContent = sys.error;
        card.appendChild(err);
        return card;
      }

      for (const dev of sys.devices || []) {
        card.appendChild(renderDevice(sys.system, dev, history));
      }
      return card;
    }

    function renderDevice(systemName, dev, history) {
      const row = document.createElement("div");
      const status = dev.status || "ok";
      row.className = "device device-status-" + status;

      // Column 1: name + mode/reason
      const info = document.createElement("div");
      const nameEl = document.createElement("div");
      nameEl.className = "device-name";
      nameEl.textContent = dev.name;
      const detailEl = document.createElement("div");
      detailEl.className = "device-detail";
      detailEl.textContent = buildDetail(dev);
      info.appendChild(nameEl);
      info.appendChild(detailEl);
      row.appendChild(info);

      // Column 2: SET — the primary signal (what Daniel cares about most)
      row.appendChild(tempCell("set", "temp-set", dev.setpoint_f));
      // Column 3: NOW — secondary; dimmed unless out of spec
      row.appendChild(tempCell("now", "temp-now", dev.current_f));
      // Column 4: sparkline of "now" over the last 24h
      row.appendChild(sparkline(history, systemName + ":" + dev.name));
      return row;
    }

    function tempCell(label, modClass, value) {
      const cell = document.createElement("div");
      cell.className = "temp " + modClass;
      const lab = document.createElement("span");
      lab.className = "temp-label";
      lab.textContent = label;
      const val = document.createElement("span");
      val.className = "temp-value";
      val.textContent = formatTemp(value);
      cell.appendChild(lab);
      cell.appendChild(val);
      return cell;
    }

    function buildDetail(dev) {
      // Setpoint now has its own column — keep only the qualitative bits here.
      const parts = [];
      if (dev.mode) parts.push(dev.mode);
      if (dev.reason) parts.push(dev.reason);
      return parts.join(" · ");
    }

    function sparkline(history, key) {
      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("class", "spark");
      svg.setAttribute("viewBox", "0 0 72 28");
      svg.setAttribute("preserveAspectRatio", "none");

      // Pull this device's readings out of each history entry. Skip nulls
      // (the device might've been offline for some hours).
      const points = [];
      for (const h of history) {
        const v = h.readings && h.readings[key];
        if (v != null) points.push(v);
      }

      if (points.length < 2) {
        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", "36");
        text.setAttribute("y", "19");
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("fill", "currentColor");
        text.setAttribute("opacity", "0.35");
        text.setAttribute("font-size", "10");
        text.textContent = "—";
        svg.appendChild(text);
        return svg;
      }

      const min = Math.min(...points);
      const max = Math.max(...points);
      const range = max - min || 1;
      const step = 72 / (points.length - 1);

      let d = "";
      for (let i = 0; i < points.length; i++) {
        const x = i * step;
        // Leave 3px padding top/bottom so the line doesn't clip the SVG edges.
        const y = 25 - ((points[i] - min) / range) * 22;
        d += (i === 0 ? "M" : "L") + x.toFixed(1) + "," + y.toFixed(1);
      }

      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("d", d);
      path.setAttribute("fill", "none");
      path.setAttribute("stroke", "var(--spark)");
      path.setAttribute("stroke-width", "1.5");
      path.setAttribute("stroke-linecap", "round");
      path.setAttribute("stroke-linejoin", "round");
      svg.appendChild(path);

      // Final-point dot so it's clear where "now" is.
      const last = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      last.setAttribute("cx", (72).toFixed(1));
      last.setAttribute("cy", (25 - ((points[points.length - 1] - min) / range) * 22).toFixed(1));
      last.setAttribute("r", "1.75");
      last.setAttribute("fill", "var(--spark)");
      svg.appendChild(last);

      return svg;
    }

    function formatTemp(v) {
      if (v == null) return "—";
      return v.toFixed(1) + "°F";
    }

    function formatTime(iso) {
      if (!iso) return "just now";
      try {
        return new Date(iso).toLocaleString(undefined, {
          dateStyle: "medium",
          timeStyle: "short"
        });
      } catch (_) {
        return iso;
      }
    }

    load();
    // Soft refresh every 5 min while the page is open.
    setInterval(load, 5 * 60 * 1000);
    // Refresh when the tab is foregrounded — useful on phone.
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") load();
    });
  </script>
</body>
</html>
